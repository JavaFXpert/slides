<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carbon Slides</title>

  <!-- IBM Plex fonts via CDN -->
  <link rel="stylesheet" href="https://1.www.s81c.com/common/carbon/plex/sans.css" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,600;0,700;1,400&display=swap" />

  <!-- Marked.js for Markdown parsing -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>

  <!-- Mermaid for diagrams -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mermaid/10.9.0/mermaid.min.js"></script>

  <style>
    /* =========================================================
       CARBON DESIGN TOKENS (White theme)
       ========================================================= */
    :root {
      /* Core colors */
      --cds-background:           #ffffff;
      --cds-layer-01:             #f4f4f4;
      --cds-layer-02:             #e0e0e0;
      --cds-border-subtle:        #e0e0e0;
      --cds-border-strong:        #8d8d8d;

      /* Text */
      --cds-text-primary:         #161616;
      --cds-text-secondary:       #525252;
      --cds-text-placeholder:     #a8a8a8;
      --cds-text-on-color:        #ffffff;
      --cds-text-inverse:         #ffffff;

      /* Interactive */
      --cds-link-primary:         #0f62fe;
      --cds-link-visited:         #8a3ffc;
      --cds-focus:                #0f62fe;
      --cds-interactive:          #0f62fe;

      /* Support */
      --cds-support-error:        #da1e28;
      --cds-support-success:      #198038;
      --cds-support-warning:      #f1c21b;
      --cds-support-info:         #0043ce;

      /* Spacing scale (Carbon's 2-4-8 progression) */
      --cds-spacing-01: 0.125rem;  /*  2px */
      --cds-spacing-02: 0.25rem;   /*  4px */
      --cds-spacing-03: 0.5rem;    /*  8px */
      --cds-spacing-04: 0.75rem;   /* 12px */
      --cds-spacing-05: 1rem;      /* 16px */
      --cds-spacing-06: 1.5rem;    /* 24px */
      --cds-spacing-07: 2rem;      /* 32px */
      --cds-spacing-08: 2.5rem;    /* 40px */
      --cds-spacing-09: 3rem;      /* 48px */

      /* Type scale */
      --cds-body-01-size:         0.875rem;   /* 14px */
      --cds-body-02-size:         1rem;       /* 16px */
      --cds-heading-01-size:      0.875rem;   /* 14px */
      --cds-heading-02-size:      1rem;       /* 16px */
      --cds-heading-03-size:      1.25rem;    /* 20px */
      --cds-heading-04-size:      1.75rem;    /* 28px */
      --cds-heading-05-size:      2rem;       /* 32px */
      --cds-heading-06-size:      2.625rem;   /* 42px */
      --cds-heading-07-size:      3.375rem;   /* 54px */
    }

    /* =========================================================
       DARK THEME (toggle via .dark-theme on <html>)
       ========================================================= */
    html.dark-theme {
      --cds-background:           #161616;
      --cds-layer-01:             #262626;
      --cds-layer-02:             #393939;
      --cds-border-subtle:        #393939;
      --cds-border-strong:        #6f6f6f;
      --cds-text-primary:         #f4f4f4;
      --cds-text-secondary:       #c6c6c6;
      --cds-text-placeholder:     #6f6f6f;
      --cds-link-primary:         #78a9ff;
      --cds-link-visited:         #be95ff;
      --cds-interactive:          #4589ff;
    }

    /* =========================================================
       RESET AND BASE
       ========================================================= */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      font-size: 100%;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      font-family: 'IBM Plex Sans', 'Helvetica Neue', Arial, sans-serif;
      font-size: var(--cds-body-02-size);
      line-height: 1.5;
      color: var(--cds-text-primary);
      background-color: var(--cds-background);
    }

    /* =========================================================
       TOP NAV BAR (Carbon UI Shell inspired)
       ========================================================= */
    .nav-bar {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 3rem;
      padding: 0 var(--cds-spacing-05);
      background-color: var(--cds-text-primary);
      color: var(--cds-text-inverse);
      font-size: 0.875rem;
      font-weight: 400;
      letter-spacing: 0.16px;
    }

    .nav-bar-title {
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .nav-bar-controls {
      display: flex;
      align-items: center;
      gap: var(--cds-spacing-04);
    }

    .nav-bar button {
      background: none;
      border: 1px solid transparent;
      color: var(--cds-text-inverse);
      font-family: inherit;
      font-size: 0.875rem;
      cursor: pointer;
      padding: var(--cds-spacing-02) var(--cds-spacing-03);
      border-radius: 0;
      transition: background-color 0.15s;
    }

    .nav-bar button:hover {
      background-color: rgba(255, 255, 255, 0.1);
    }

    .nav-bar button:focus {
      outline: 2px solid var(--cds-focus);
      outline-offset: -2px;
    }

    .slide-counter {
      font-variant-numeric: tabular-nums;
      opacity: 0.7;
    }

    /* =========================================================
       MAIN CONTAINER
       ========================================================= */
    .slides-container {
      max-width: 52rem;    /* ~832px, Carbon's standard content width */
      margin: 0 auto;
      padding: var(--cds-spacing-07) var(--cds-spacing-05);
    }

    /* =========================================================
       TITLE SLIDE (first section)
       ========================================================= */
    .slide.title-slide {
      padding: var(--cds-spacing-09) 0;
      border-bottom: none;
    }

    .slide.title-slide h1 {
      font-size: var(--cds-heading-07);
      font-weight: 300;
      line-height: 1.15;
      letter-spacing: 0;
      margin-bottom: var(--cds-spacing-05);
      color: var(--cds-text-primary);
    }

    .slide.title-slide h3 {
      font-size: var(--cds-heading-04);
      font-weight: 300;
      line-height: 1.3;
      color: var(--cds-text-secondary);
      margin-bottom: var(--cds-spacing-06);
    }

    .slide.title-slide blockquote {
      background: none;
      border-left: none;
      padding: 0;
      color: var(--cds-text-secondary);
      font-size: var(--cds-body-01-size);
    }

    /* =========================================================
       SLIDE SECTIONS
       ========================================================= */
    .slide {
      padding: var(--cds-spacing-08) 0;
      border-bottom: 1px solid var(--cds-border-subtle);
    }

    .slide:last-child {
      border-bottom: none;
    }

    /* =========================================================
       TYPOGRAPHY
       ========================================================= */

    /* h2 = Slide title (expressive heading-05) */
    .slide h2 {
      font-size: var(--cds-heading-05);
      font-weight: 300;
      line-height: 1.25;
      letter-spacing: 0;
      margin-bottom: var(--cds-spacing-06);
      color: var(--cds-text-primary);
    }

    /* h3 = Sub-heading within a slide */
    .slide h3 {
      font-size: var(--cds-heading-03);
      font-weight: 600;
      line-height: 1.4;
      margin-top: var(--cds-spacing-07);
      margin-bottom: var(--cds-spacing-04);
      color: var(--cds-text-primary);
    }

    /* Body paragraphs */
    .slide p {
      font-size: var(--cds-body-02-size);
      line-height: 1.625;
      color: var(--cds-text-primary);
      margin-bottom: var(--cds-spacing-05);
      max-width: 42rem;  /* Optimal reading measure */
    }

    /* Bold = semibold 600, not 700 (Carbon convention) */
    .slide strong {
      font-weight: 600;
    }

    /* Links */
    .slide a {
      color: var(--cds-link-primary);
      text-decoration: none;
    }

    .slide a:hover {
      text-decoration: underline;
    }

    .slide a:visited {
      color: var(--cds-link-visited);
    }

    /* =========================================================
       LISTS
       ========================================================= */
    .slide ul, .slide ol {
      margin-bottom: var(--cds-spacing-05);
      padding-left: var(--cds-spacing-06);
    }

    .slide li {
      font-size: var(--cds-body-02-size);
      line-height: 1.625;
      margin-bottom: var(--cds-spacing-03);
      color: var(--cds-text-primary);
    }

    .slide li ul, .slide li ol {
      margin-top: var(--cds-spacing-03);
      margin-bottom: 0;
    }

    /* =========================================================
       BLOCKQUOTES (used as callouts / key messages)
       ========================================================= */
    .slide blockquote {
      border-left: 3px solid var(--cds-interactive);
      background-color: var(--cds-layer-01);
      padding: var(--cds-spacing-05);
      margin: var(--cds-spacing-06) 0;
    }

    .slide blockquote p {
      font-size: var(--cds-body-02-size);
      font-weight: 400;
      color: var(--cds-text-primary);
      margin-bottom: 0;
      font-style: normal;
    }

    .slide blockquote p em {
      font-style: italic;
      color: var(--cds-text-secondary);
    }

    /* =========================================================
       TABLES (Carbon data table styling)
       ========================================================= */
    .slide table {
      width: 100%;
      border-collapse: collapse;
      margin: var(--cds-spacing-06) 0;
      font-size: var(--cds-body-01-size);
    }

    .slide thead th {
      text-align: left;
      font-weight: 600;
      font-size: 0.75rem;
      letter-spacing: 0.32px;
      text-transform: uppercase;
      color: var(--cds-text-primary);
      background-color: var(--cds-layer-01);
      padding: var(--cds-spacing-03) var(--cds-spacing-05);
      border-bottom: 1px solid var(--cds-border-strong);
    }

    .slide tbody td {
      padding: var(--cds-spacing-03) var(--cds-spacing-05);
      border-bottom: 1px solid var(--cds-border-subtle);
      color: var(--cds-text-primary);
      vertical-align: top;
    }

    .slide tbody tr:hover {
      background-color: var(--cds-layer-01);
    }

    /* =========================================================
       CODE BLOCKS
       ========================================================= */
    .slide code {
      font-family: 'IBM Plex Mono', 'Menlo', 'DejaVu Sans Mono', monospace;
      font-size: 0.8125rem;
    }

    /* Inline code */
    .slide p code, .slide li code, .slide td code {
      background-color: var(--cds-layer-01);
      padding: 0.125em 0.375em;
      border-radius: 0;
    }

    /* Fenced code blocks */
    .slide pre {
      background-color: var(--cds-layer-01);
      padding: var(--cds-spacing-05);
      margin: var(--cds-spacing-06) 0;
      overflow-x: auto;
      border-radius: 0;
    }

    .slide pre code {
      background: none;
      padding: 0;
      line-height: 1.6;
    }

    /* =========================================================
       IMAGES
       ========================================================= */
    .slide img {
      max-width: 100%;
      height: auto;
      display: block;
      margin: var(--cds-spacing-06) 0;
    }

    /* Image captions (italic paragraph right after an image) */
    .slide img + em,
    .slide .caption {
      display: block;
      font-size: var(--cds-body-01-size);
      color: var(--cds-text-secondary);
      margin-top: calc(-1 * var(--cds-spacing-04));
      margin-bottom: var(--cds-spacing-05);
    }

    /* =========================================================
       MERMAID DIAGRAMS
       ========================================================= */
    .slide .mermaid {
      margin: var(--cds-spacing-06) 0;
      text-align: center;
    }

    .slide .mermaid svg {
      max-width: 100%;
    }

    /* =========================================================
       BIG STAT / CALLOUT NUMBER
       (standalone bold paragraph with short content)
       ========================================================= */
    .slide p:only-of-type strong:only-child {
      font-size: var(--cds-heading-04);
      font-weight: 600;
      display: block;
      margin: var(--cds-spacing-05) 0;
      color: var(--cds-interactive);
    }

    /* =========================================================
       HORIZONTAL RULES (hidden -- used as slide boundaries)
       ========================================================= */
    .slide hr {
      display: none;
    }

    /* =========================================================
       FOOTER
       ========================================================= */
    .footer {
      max-width: 52rem;
      margin: 0 auto;
      padding: var(--cds-spacing-07) var(--cds-spacing-05);
      border-top: 1px solid var(--cds-border-subtle);
      font-size: 0.75rem;
      color: var(--cds-text-secondary);
      display: flex;
      justify-content: space-between;
    }

    /* =========================================================
       PRINT STYLES
       ========================================================= */
    @media print {
      .nav-bar { display: none; }
      .slide { page-break-inside: avoid; }
    }

    /* =========================================================
       RESPONSIVE ADJUSTMENTS
       ========================================================= */
    @media (max-width: 672px) {
      .slide h2 {
        font-size: var(--cds-heading-04);
      }
      .slide.title-slide h1 {
        font-size: var(--cds-heading-05);
      }
      .slides-container {
        padding: var(--cds-spacing-05) var(--cds-spacing-05);
      }
    }
  </style>
</head>
<body>

  <!-- Top navigation bar -->
  <nav class="nav-bar" role="banner">
    <span class="nav-bar-title" id="deckTitle">Carbon Slides</span>
    <div class="nav-bar-controls">
      <span class="slide-counter" id="slideCounter"></span>
      <button onclick="toggleTheme()" title="Toggle dark/light theme">Theme</button>
    </div>
  </nav>

  <!-- Slides render here -->
  <main class="slides-container" id="slidesContainer">
    <p style="color: var(--cds-text-secondary);">Loading slides...</p>
  </main>

  <footer class="footer">
    <span>Built with Carbon Design System tokens</span>
    <span id="footerDate"></span>
  </footer>

  <script>
    /* ==========================================================
       CONFIGURATION
       ==========================================================
       Change this path to point to your Markdown slides file.
       It must be relative to this HTML file in the same repo.   */

    const SLIDES_FILE = 'slides.md';

    /* ========================================================== */

    // Theme toggle
    function toggleTheme() {
      document.documentElement.classList.toggle('dark-theme');
      const isDark = document.documentElement.classList.contains('dark-theme');
      mermaid.initialize({
        startOnLoad: false,
        theme: isDark ? 'dark' : 'neutral',
        fontFamily: 'IBM Plex Sans',
      });
      renderMermaid();
    }

    // Initialize Mermaid
    mermaid.initialize({
      startOnLoad: false,
      theme: 'neutral',
      fontFamily: 'IBM Plex Sans',
      flowchart: { curve: 'monotoneX' },
    });

    // Configure Marked v12 with proper extension API
    marked.use({
      gfm: true,
      breaks: false,
      renderer: {
        code({ text, lang }) {
          if (lang === 'mermaid') {
            return '<div class="mermaid">' + text + '</div>';
          }
          var escaped = text
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;');
          return '<pre><code class="language-' + (lang || '') + '">' + escaped + '</code></pre>';
        }
      }
    });

    // Render Mermaid diagrams
    let mermaidCounter = 0;
    async function renderMermaid() {
      mermaidCounter = 0;
      const mermaidDivs = document.querySelectorAll('.mermaid');
      for (let i = 0; i < mermaidDivs.length; i++) {
        const el = mermaidDivs[i];
        const graphDef = el.getAttribute('data-source') || el.textContent;
        el.setAttribute('data-source', graphDef);
        try {
          const id = 'mmd-' + Date.now() + '-' + (mermaidCounter++);
          const { svg } = await mermaid.render(id, graphDef);
          el.innerHTML = svg;
        } catch (e) {
          console.warn('Mermaid render error:', e);
          el.innerHTML = '<pre style="color:var(--cds-support-error);">Diagram error: ' + e.message + '</pre>';
        }
      }
    }

    // Render parsed Markdown sections into the page
    function renderSlides(md) {
      var sections = md.split(/\n\s*---\s*\n/);
      var container = document.getElementById('slidesContainer');
      container.innerHTML = '';

      sections.forEach(function(section, index) {
        var trimmed = section.trim();
        if (!trimmed) return;

        var slideDiv = document.createElement('div');
        slideDiv.className = 'slide' + (index === 0 ? ' title-slide' : '');
        slideDiv.id = 'slide-' + index;
        slideDiv.innerHTML = marked.parse(trimmed);
        container.appendChild(slideDiv);
      });

      var slideCount = container.querySelectorAll('.slide').length;
      document.getElementById('slideCounter').textContent =
        slideCount + ' slide' + (slideCount !== 1 ? 's' : '');

      var firstH1 = container.querySelector('h1');
      if (firstH1) {
        document.getElementById('deckTitle').textContent = firstH1.textContent;
        document.title = firstH1.textContent;
      }

      document.getElementById('footerDate').textContent =
        new Date().toLocaleDateString('en-US', {
          year: 'numeric', month: 'long', day: 'numeric'
        });
    }

    // Intersection Observer for scroll tracking
    function setupScrollTracking() {
      var counter = document.getElementById('slideCounter');
      var slides = document.querySelectorAll('.slide');
      if (!slides.length) return;

      var observer = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
          if (entry.isIntersecting) {
            var idx = Array.from(slides).indexOf(entry.target);
            counter.textContent = (idx + 1) + ' / ' + slides.length;
          }
        });
      }, { threshold: 0.3 });

      slides.forEach(function(slide) { observer.observe(slide); });
    }

    // ---- EMBEDDED DEMO CONTENT ----
    // This is used when slides.md can't be fetched (e.g. local preview).
    // On GitHub Pages, the fetch from slides.md will succeed and this is ignored.
    var EMBEDDED_SLIDES = `# The Rise of Remote Work
### How distributed teams are reshaping the modern workplace

> Jim Weaver -- March 2026

---

## Agenda

1. The shift in numbers
2. What's driving the change
3. Benefits and tradeoffs
4. Tools that make it work
5. What's next

---

## The Shift in Numbers

Remote and hybrid work have moved from a temporary experiment to a permanent fixture of the labor market.

| Metric                        | 2019   | 2023   | 2025   |
|-------------------------------|--------|--------|--------|
| % of US workers fully remote  | 5.7%   | 28%    | 22%    |
| % offering hybrid options     | 12%    | 58%    | 67%    |
| Avg. days remote per week     | 0.5    | 2.3    | 2.8    |

> The genie is out of the bottle. Workers have tasted flexibility and they are not giving it back.

---

## What's Driving the Change

The pandemic forced a rapid experiment, but the results are what made the shift stick.

\`\`\`mermaid
flowchart TD
    A[COVID-19 Pandemic] --> B[Forced Remote Experiment]
    B --> C[Companies Discover It Works]
    B --> D[Workers Discover They Prefer It]
    C --> E[Permanent Policy Changes]
    D --> E
    E --> F[Talent Competition<br/>Goes Global]
    E --> G[Office Footprints<br/>Shrink]
\`\`\`

---

## Benefits: The Employee View

- **No commute** -- the average American saves 54 minutes per day
- **Flexibility** -- work when you are most productive
- **Cost savings** -- less spent on gas, lunches, and work clothes
- **Location freedom** -- live where you want, not where the office is

> Workers with remote options report **22% higher job satisfaction** compared to fully in-office peers.

---

## Benefits: The Employer View

The business case is strong across multiple dimensions.

| Role Type         | Productivity Change |
|-------------------|---------------------|
| Software Dev      | +13%                |
| Customer Support  | +9%                 |
| Sales             | +2%                 |
| Creative/Design   | -3% to +5%         |

### Cost impact

- Talent pool expands from a metro area to the entire world
- Office space costs drop by 30-50%
- Employee retention improves with attrition dropping roughly 35%

---

## The Tradeoffs

Not everything is better. Honest challenges include:

- **Isolation** -- loneliness is the top complaint among remote workers
- **Collaboration friction** -- spontaneous hallway conversations disappear
- **Onboarding difficulty** -- new hires take longer to ramp up
- **Work-life blur** -- "always on" culture can creep in without boundaries

\`\`\`mermaid
flowchart LR
    A[Flexibility] -->|tension| B[Structure]
    C[Autonomy] -->|tension| D[Collaboration]
    E[Deep Focus] -->|tension| F[Spontaneity]
\`\`\`

---

## Tools That Make It Work

\`\`\`mermaid
flowchart TD
    subgraph Communication
        A[Slack / Teams]
        B[Zoom / Meet]
    end
    subgraph Project Management
        C[Asana / Jira]
        D[Notion / Confluence]
    end
    subgraph Development
        E[GitHub]
        F[VS Code Live Share]
    end
    subgraph Culture
        G[Donut / Watercooler Bots]
        H[Virtual Offsites]
    end
\`\`\`

> The right stack is not about having more tools. It is about having fewer tools that everyone actually uses.

---

## A Day in the Life: Hybrid Schedule

| Time        | Activity                         |
|-------------|----------------------------------|
| 8:00 AM     | Async check-in on Slack          |
| 8:30 AM     | Deep work block (no meetings)    |
| 11:00 AM    | Team standup (video)             |
| 11:30 AM    | Collaborative session            |
| 12:30 PM    | Lunch break                      |
| 1:30 PM     | Focus work                       |
| 3:00 PM     | Cross-team sync                  |
| 3:30 PM     | Wrap-up, plan tomorrow           |

---

## What's Next

Three trends to watch:

1. **AI-powered async** -- tools that summarize meetings you skip, draft replies, and triage your inbox
2. **Results-only work environments** -- no set hours, just deliverables and deadlines
3. **In-person as an event** -- quarterly offsites replace daily office attendance

\`\`\`mermaid
gantt
    title Remote Work Evolution
    dateFormat YYYY
    axisFormat %Y
    section Adoption
        Early adopters       :done, 2015, 2019
        Pandemic surge       :done, 2020, 2022
        Hybrid stabilization :active, 2023, 2025
    section Next Phase
        AI-assisted async    :2025, 2028
        Results-only culture :2026, 2030
\`\`\`

---

## Key Takeaway

> Remote work is not a perk anymore. It is infrastructure. Companies that treat flexibility as a strategic advantage will attract the best talent over the next decade.

---

## Thank You

- GitHub: github.com/jimweaver
- Email: jim@example.com

> Questions?
`;

    // Load slides: try fetching the file first, fall back to embedded content
    async function loadSlides() {
      var md;
      try {
        var response = await fetch(SLIDES_FILE);
        if (!response.ok) throw new Error('fetch failed');
        md = await response.text();
      } catch (e) {
        // Fall back to embedded content (works in local preview / artifact viewer)
        md = EMBEDDED_SLIDES;
      }

      renderSlides(md);
      await renderMermaid();
      setupScrollTracking();
    }

    loadSlides();
  </script>

</body>
</html>
