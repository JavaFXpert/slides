<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carbon Slides</title>

  <!-- IBM Plex fonts -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,600;0,700;1,400&display=swap" />

  <style>
    :root {
      --cds-background:           #ffffff;
      --cds-layer-01:             #f4f4f4;
      --cds-layer-02:             #e0e0e0;
      --cds-border-subtle:        #e0e0e0;
      --cds-border-strong:        #8d8d8d;
      --cds-text-primary:         #161616;
      --cds-text-secondary:       #525252;
      --cds-text-inverse:         #ffffff;
      --cds-link-primary:         #0f62fe;
      --cds-link-visited:         #8a3ffc;
      --cds-focus:                #0f62fe;
      --cds-interactive:          #0f62fe;
      --cds-support-error:        #da1e28;
      --cds-spacing-02: 0.25rem;
      --cds-spacing-03: 0.5rem;
      --cds-spacing-04: 0.75rem;
      --cds-spacing-05: 1rem;
      --cds-spacing-06: 1.5rem;
      --cds-spacing-07: 2rem;
      --cds-spacing-08: 2.5rem;
      --cds-spacing-09: 3rem;
      --cds-body-01-size:         0.875rem;
      --cds-body-02-size:         1rem;
      --cds-heading-03-size:      1.25rem;
      --cds-heading-04-size:      1.75rem;
      --cds-heading-05-size:      2rem;
      --cds-heading-07-size:      3.375rem;
    }

    html.dark-theme {
      --cds-background:           #161616;
      --cds-layer-01:             #262626;
      --cds-layer-02:             #393939;
      --cds-border-subtle:        #393939;
      --cds-border-strong:        #6f6f6f;
      --cds-text-primary:         #f4f4f4;
      --cds-text-secondary:       #c6c6c6;
      --cds-text-inverse:         #ffffff;
      --cds-link-primary:         #78a9ff;
      --cds-link-visited:         #be95ff;
      --cds-interactive:          #4589ff;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 100%; -webkit-font-smoothing: antialiased; }
    body {
      font-family: 'IBM Plex Sans', 'Helvetica Neue', Arial, sans-serif;
      font-size: var(--cds-body-02-size); line-height: 1.5;
      color: var(--cds-text-primary); background-color: var(--cds-background);
    }

    .nav-bar {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      height: 3rem; padding: 0 var(--cds-spacing-05);
      background-color: var(--cds-text-primary); color: var(--cds-text-inverse);
      font-size: 0.875rem;
    }
    .nav-bar-title { font-weight: 600; }
    .nav-bar-controls { display: flex; align-items: center; gap: var(--cds-spacing-04); }
    .nav-bar button {
      background: none; border: 1px solid transparent;
      color: var(--cds-text-inverse); font-family: inherit;
      font-size: 0.875rem; cursor: pointer;
      padding: var(--cds-spacing-02) var(--cds-spacing-03);
    }
    .nav-bar button:hover { background-color: rgba(255,255,255,0.1); }
    .slide-counter { font-variant-numeric: tabular-nums; opacity: 0.7; }

    .slides-container {
      max-width: 52rem; margin: 0 auto;
      padding: var(--cds-spacing-07) var(--cds-spacing-05);
    }

    .slide.title-slide { padding: var(--cds-spacing-09) 0; border-bottom: none; }
    .slide.title-slide h1 {
      font-size: var(--cds-heading-07-size); font-weight: 300;
      line-height: 1.15; margin-bottom: var(--cds-spacing-05);
    }
    .slide.title-slide h3 {
      font-size: var(--cds-heading-04-size); font-weight: 300;
      line-height: 1.3; color: var(--cds-text-secondary);
      margin-bottom: var(--cds-spacing-06);
    }
    .slide.title-slide blockquote {
      background: none; border-left: none; padding: 0;
      color: var(--cds-text-secondary); font-size: var(--cds-body-01-size);
    }

    .slide {
      padding: var(--cds-spacing-08) 0;
      border-bottom: 1px solid var(--cds-border-subtle);
    }
    .slide:last-child { border-bottom: none; }

    .slide h2 {
      font-size: var(--cds-heading-05-size); font-weight: 300;
      line-height: 1.25; margin-bottom: var(--cds-spacing-06);
    }
    .slide h3 {
      font-size: var(--cds-heading-03-size); font-weight: 600;
      line-height: 1.4; margin-top: var(--cds-spacing-07);
      margin-bottom: var(--cds-spacing-04);
    }
    .slide p {
      font-size: var(--cds-body-02-size); line-height: 1.625;
      margin-bottom: var(--cds-spacing-05); max-width: 42rem;
    }
    .slide strong { font-weight: 600; }
    .slide a { color: var(--cds-link-primary); text-decoration: none; }
    .slide a:hover { text-decoration: underline; }

    .slide ul, .slide ol {
      margin-bottom: var(--cds-spacing-05); padding-left: var(--cds-spacing-06);
    }
    .slide li {
      font-size: var(--cds-body-02-size); line-height: 1.625;
      margin-bottom: var(--cds-spacing-03);
    }

    .slide blockquote {
      border-left: 3px solid var(--cds-interactive);
      background-color: var(--cds-layer-01);
      padding: var(--cds-spacing-05); margin: var(--cds-spacing-06) 0;
    }
    .slide blockquote p { margin-bottom: 0; font-style: normal; }

    .slide table {
      width: 100%; border-collapse: collapse;
      margin: var(--cds-spacing-06) 0; font-size: var(--cds-body-01-size);
    }
    .slide thead th {
      text-align: left; font-weight: 600; font-size: 0.75rem;
      letter-spacing: 0.32px; text-transform: uppercase;
      background-color: var(--cds-layer-01);
      padding: var(--cds-spacing-03) var(--cds-spacing-05);
      border-bottom: 1px solid var(--cds-border-strong);
    }
    .slide tbody td {
      padding: var(--cds-spacing-03) var(--cds-spacing-05);
      border-bottom: 1px solid var(--cds-border-subtle); vertical-align: top;
    }
    .slide tbody tr:hover { background-color: var(--cds-layer-01); }

    .slide code {
      font-family: 'IBM Plex Mono', 'Menlo', monospace; font-size: 0.8125rem;
    }
    .slide p code, .slide li code, .slide td code {
      background-color: var(--cds-layer-01); padding: 0.125em 0.375em;
    }
    .slide pre {
      background-color: var(--cds-layer-01); padding: var(--cds-spacing-05);
      margin: var(--cds-spacing-06) 0; overflow-x: auto;
    }
    .slide pre code { background: none; padding: 0; line-height: 1.6; }

    .slide img {
      max-width: 100%; height: auto; display: block;
      margin: var(--cds-spacing-06) 0;
    }

    .mermaid-diagram {
      margin: var(--cds-spacing-06) 0; text-align: center;
    }
    .mermaid-diagram svg { max-width: 100%; }
    .mermaid-fallback {
      text-align: left; font-size: 12px;
      color: var(--cds-text-secondary);
      font-family: 'IBM Plex Mono', monospace;
    }

    .footer {
      max-width: 52rem; margin: 0 auto;
      padding: var(--cds-spacing-07) var(--cds-spacing-05);
      border-top: 1px solid var(--cds-border-subtle);
      font-size: 0.75rem; color: var(--cds-text-secondary);
      display: flex; justify-content: space-between;
    }

    @media print {
      .nav-bar { display: none; }
      .slide { page-break-inside: avoid; }
    }
    @media (max-width: 672px) {
      .slide h2 { font-size: var(--cds-heading-04-size); }
      .slide.title-slide h1 { font-size: var(--cds-heading-05-size); }
    }
  </style>
</head>
<body>

  <nav class="nav-bar" role="banner">
    <span class="nav-bar-title" id="deckTitle">Carbon Slides</span>
    <div class="nav-bar-controls">
      <span class="slide-counter" id="slideCounter"></span>
      <button onclick="toggleTheme()">Theme</button>
    </div>
  </nav>

  <main class="slides-container" id="slidesContainer">
    <p style="color: var(--cds-text-secondary);">Loading slides...</p>
  </main>

  <footer class="footer">
    <span>Built with Carbon Design System tokens</span>
    <span id="footerDate"></span>
  </footer>

  <!-- marked v4: stable renderer API -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.3.0/marked.min.js"></script>

  <script>
    var SLIDES_FILE = 'slides.md';

    // Carbon-to-Mermaid color mapping
    // Mermaid's 'base' theme lets us override every color via themeVariables.
    // We map Carbon's token values directly so diagrams match the page.
    var MERMAID_LIGHT = {
      theme: 'base',
      themeVariables: {
        // Node fills and borders (Carbon neutral gray)
        primaryColor:       '#e0e0e0', // cds-layer-02: default node fill
        primaryBorderColor: '#8d8d8d', // cds-border-strong: node borders
        primaryTextColor:   '#161616', // cds-text-primary: text in nodes

        // Secondary nodes (Carbon Blue family for accents)
        secondaryColor:       '#d0e2ff', // Blue 20: secondary node fill
        secondaryBorderColor: '#0f62fe', // Blue 60 (cds-interactive)
        secondaryTextColor:   '#161616',

        // Tertiary / subgraph backgrounds
        tertiaryColor:       '#f4f4f4', // cds-layer-01
        tertiaryBorderColor: '#e0e0e0', // cds-border-subtle
        tertiaryTextColor:   '#161616',

        // Connectors and labels
        lineColor:            '#525252', // cds-text-secondary: arrows
        textColor:            '#161616', // general labels
        edgeLabelBackground:  '#ffffff', // cds-background

        // Subgraph (cluster) styling
        clusterBkg:    '#f4f4f4', // cds-layer-01
        clusterBorder: '#e0e0e0', // cds-border-subtle

        // Gantt chart
        gridColor:       '#e0e0e0',
        doneTaskBkgColor:'#a6c8ff', // Blue 30
        doneTaskBorderColor: '#0f62fe',
        activeTaskBkgColor:  '#d0e2ff', // Blue 20
        activeTaskBorderColor:'#0f62fe',
        critBkgColor:    '#fff1f1', // Red 10
        critBorderColor: '#da1e28', // cds-support-error
        taskTextColor:   '#161616',
        sectionBkgColor: '#f4f4f4',
        altSectionBkgColor: '#e0e0e0',
        sectionBkgColor2: '#f4f4f4',

        // Fonts
        fontFamily: 'IBM Plex Sans, Helvetica Neue, Arial, sans-serif',
        fontSize: '14px'
      }
    };

    var MERMAID_DARK = {
      theme: 'base',
      themeVariables: {
        primaryColor:       '#393939', // cds-layer-02 dark
        primaryBorderColor: '#6f6f6f', // cds-border-strong dark
        primaryTextColor:   '#f4f4f4', // cds-text-primary dark

        secondaryColor:       '#002d9c', // Blue 80
        secondaryBorderColor: '#4589ff', // cds-interactive dark
        secondaryTextColor:   '#f4f4f4',

        tertiaryColor:       '#262626', // cds-layer-01 dark
        tertiaryBorderColor: '#393939',
        tertiaryTextColor:   '#f4f4f4',

        lineColor:            '#c6c6c6', // cds-text-secondary dark
        textColor:            '#f4f4f4',
        edgeLabelBackground:  '#161616', // cds-background dark

        clusterBkg:    '#262626',
        clusterBorder: '#393939',

        gridColor:       '#393939',
        doneTaskBkgColor:'#0043ce', // Blue 70
        doneTaskBorderColor: '#4589ff',
        activeTaskBkgColor:  '#002d9c',
        activeTaskBorderColor:'#4589ff',
        critBkgColor:    '#520408',
        critBorderColor: '#fa4d56',
        taskTextColor:   '#f4f4f4',
        sectionBkgColor: '#262626',
        altSectionBkgColor: '#393939',
        sectionBkgColor2: '#262626',

        fontFamily: 'IBM Plex Sans, Helvetica Neue, Arial, sans-serif',
        fontSize: '14px'
      }
    };

    function getMermaidConfig(isDark) {
      var vars = isDark ? MERMAID_DARK : MERMAID_LIGHT;
      return {
        startOnLoad: false,
        securityLevel: 'loose',
        theme: vars.theme,
        themeVariables: vars.themeVariables,
        flowchart: { curve: 'monotoneX' }
      };
    }

    function toggleTheme() {
      document.documentElement.classList.toggle('dark-theme');
      if (typeof mermaid !== 'undefined') {
        var isDark = document.documentElement.classList.contains('dark-theme');
        try {
          mermaid.initialize(getMermaidConfig(isDark));
        } catch(e) {}
        renderMermaid();
      }
    }

    // Pre-process: pull mermaid blocks out of the markdown BEFORE marked sees them.
    // This avoids all renderer API compatibility issues.
    function extractMermaidBlocks(md) {
      var i = 0;
      return md.replace(/```mermaid\s*\n([\s\S]*?)```/g, function(match, diagram) {
        var id = 'mermaid-ph-' + (i++);
        var escaped = diagram.trim()
          .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        return '<div class="mermaid-diagram" id="' + id +
          '" data-graph="' + encodeURIComponent(diagram.trim()) + '">' +
          '<pre class="mermaid-fallback">' + escaped + '</pre></div>';
      });
    }

    // Render mermaid diagrams from the placeholder divs
    var mermaidRenderCount = 0;
    async function renderMermaid() {
      if (typeof mermaid === 'undefined') return;
      var els = document.querySelectorAll('.mermaid-diagram[data-graph]');
      for (var i = 0; i < els.length; i++) {
        var el = els[i];
        var graphDef = decodeURIComponent(el.getAttribute('data-graph'));
        try {
          var uid = 'mmd' + Date.now() + '_' + (mermaidRenderCount++);
          var result = await mermaid.render(uid, graphDef);
          el.innerHTML = result.svg;
        } catch (e) {
          console.warn('Mermaid diagram ' + i + ' error:', e);
        }
      }
    }

    // Configure marked v4
    marked.setOptions({ gfm: true, breaks: false });

    function renderSlides(md) {
      var processed = extractMermaidBlocks(md);
      var sections = processed.split(/\n\s*---\s*\n/);
      var container = document.getElementById('slidesContainer');
      container.innerHTML = '';

      sections.forEach(function(section, index) {
        var trimmed = section.trim();
        if (!trimmed) return;
        var div = document.createElement('div');
        div.className = 'slide' + (index === 0 ? ' title-slide' : '');
        div.id = 'slide-' + index;
        div.innerHTML = marked.parse(trimmed);
        container.appendChild(div);
      });

      var count = container.querySelectorAll('.slide').length;
      document.getElementById('slideCounter').textContent =
        count + ' slide' + (count !== 1 ? 's' : '');

      var h1 = container.querySelector('h1');
      if (h1) {
        document.getElementById('deckTitle').textContent = h1.textContent;
        document.title = h1.textContent;
      }
      document.getElementById('footerDate').textContent =
        new Date().toLocaleDateString('en-US', {
          year: 'numeric', month: 'long', day: 'numeric'
        });
    }

    function setupScrollTracking() {
      var counter = document.getElementById('slideCounter');
      var slides = document.querySelectorAll('.slide');
      if (!slides.length) return;
      var observer = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
          if (entry.isIntersecting) {
            var idx = Array.from(slides).indexOf(entry.target);
            counter.textContent = (idx + 1) + ' / ' + slides.length;
          }
        });
      }, { threshold: 0.3 });
      slides.forEach(function(s) { observer.observe(s); });
    }

    // Embedded demo (fallback when fetch fails, e.g. in preview)
    var DEMO = '# The Rise of Remote Work\n### How distributed teams are reshaping the modern workplace\n\n> Jim Weaver -- March 2026\n\n---\n\n## Agenda\n\n1. The shift in numbers\n2. What\'s driving the change\n3. Benefits and tradeoffs\n4. Tools that make it work\n5. What\'s next\n\n---\n\n## The Shift in Numbers\n\nRemote and hybrid work have moved from a temporary experiment to a permanent fixture of the labor market.\n\n| Metric                        | 2019   | 2023   | 2025   |\n|-------------------------------|--------|--------|--------|\n| % of US workers fully remote  | 5.7%   | 28%    | 22%    |\n| % offering hybrid options     | 12%    | 58%    | 67%    |\n| Avg. days remote per week     | 0.5    | 2.3    | 2.8    |\n\n> The genie is out of the bottle. Workers have tasted flexibility and they are not giving it back.\n\n---\n\n## What\'s Driving the Change\n\nThe pandemic forced a rapid experiment, but the results are what made the shift stick.\n\n```mermaid\nflowchart TD\n    A[COVID-19 Pandemic] --> B[Forced Remote Experiment]\n    B --> C[Companies Discover It Works]\n    B --> D[Workers Discover They Prefer It]\n    C --> E[Permanent Policy Changes]\n    D --> E\n    E --> F[Talent Competition<br/>Goes Global]\n    E --> G[Office Footprints<br/>Shrink]\n```\n\n---\n\n## Benefits: The Employee View\n\n- **No commute** -- the average American saves 54 minutes per day\n- **Flexibility** -- work when you are most productive\n- **Cost savings** -- less spent on gas, lunches, and work clothes\n- **Location freedom** -- live where you want, not where the office is\n\n> Workers with remote options report **22% higher job satisfaction** compared to fully in-office peers.\n\n---\n\n## Benefits: The Employer View\n\nThe business case is strong across multiple dimensions.\n\n| Role Type         | Productivity Change |\n|-------------------|---------------------|\n| Software Dev      | +13%                |\n| Customer Support  | +9%                 |\n| Sales             | +2%                 |\n| Creative/Design   | -3% to +5%         |\n\n### Cost impact\n\n- Talent pool expands from a metro area to the entire world\n- Office space costs drop by 30-50%\n- Employee retention improves with attrition dropping roughly 35%\n\n---\n\n## The Tradeoffs\n\nNot everything is better. Honest challenges include:\n\n- **Isolation** -- loneliness is the top complaint among remote workers\n- **Collaboration friction** -- spontaneous hallway conversations disappear\n- **Onboarding difficulty** -- new hires take longer to ramp up\n- **Work-life blur** -- \"always on\" culture can creep in without boundaries\n\n```mermaid\nflowchart LR\n    A[Flexibility] -->|tension| B[Structure]\n    C[Autonomy] -->|tension| D[Collaboration]\n    E[Deep Focus] -->|tension| F[Spontaneity]\n```\n\n---\n\n## Tools That Make It Work\n\n```mermaid\nflowchart TD\n    subgraph Communication\n        A[Slack / Teams]\n        B[Zoom / Meet]\n    end\n    subgraph Project Management\n        C[Asana / Jira]\n        D[Notion / Confluence]\n    end\n    subgraph Development\n        E[GitHub]\n        F[VS Code Live Share]\n    end\n    subgraph Culture\n        G[Donut / Watercooler Bots]\n        H[Virtual Offsites]\n    end\n```\n\n> The right stack is not about having more tools. It is about having fewer tools that everyone actually uses.\n\n---\n\n## A Day in the Life: Hybrid Schedule\n\n| Time        | Activity                         |\n|-------------|----------------------------------|\n| 8:00 AM     | Async check-in on Slack          |\n| 8:30 AM     | Deep work block (no meetings)    |\n| 11:00 AM    | Team standup (video)             |\n| 11:30 AM    | Collaborative session            |\n| 12:30 PM    | Lunch break                      |\n| 1:30 PM     | Focus work                       |\n| 3:00 PM     | Cross-team sync                  |\n| 3:30 PM     | Wrap-up, plan tomorrow           |\n\n---\n\n## What\'s Next\n\nThree trends to watch:\n\n1. **AI-powered async** -- tools that summarize meetings you skip, draft replies, and triage your inbox\n2. **Results-only work environments** -- no set hours, just deliverables and deadlines\n3. **In-person as an event** -- quarterly offsites replace daily office attendance\n\n```mermaid\ngantt\n    title Remote Work Evolution\n    dateFormat YYYY\n    axisFormat %Y\n    section Adoption\n        Early adopters       :done, 2015, 2019\n        Pandemic surge       :done, 2020, 2022\n        Hybrid stabilization :active, 2023, 2025\n    section Next Phase\n        AI-assisted async    :2025, 2028\n        Results-only culture :2026, 2030\n```\n\n---\n\n## Key Takeaway\n\n> Remote work is not a perk anymore. It is infrastructure. Companies that treat flexibility as a strategic advantage will attract the best talent over the next decade.\n\n---\n\n## Thank You\n\n- GitHub: github.com/jimweaver\n- Email: jim@example.com\n\n> Questions?';

    async function loadSlides() {
      var md;
      try {
        var resp = await fetch(SLIDES_FILE);
        if (!resp.ok) throw new Error('not found');
        md = await resp.text();
      } catch (e) {
        md = DEMO;
      }
      renderSlides(md);
      setupScrollTracking();

      // Load mermaid async so it never blocks slide rendering
      var script = document.createElement('script');
      script.src = 'https://cdnjs.cloudflare.com/ajax/libs/mermaid/10.9.0/mermaid.min.js';
      script.onload = function() {
        try {
          mermaid.initialize(getMermaidConfig(
            document.documentElement.classList.contains('dark-theme')
          ));
          renderMermaid();
        } catch(e) {
          console.warn('Mermaid setup failed:', e);
        }
      };
      script.onerror = function() {
        console.warn('Mermaid CDN failed to load');
      };
      document.body.appendChild(script);
    }

    loadSlides();
  </script>

</body>
</html>
